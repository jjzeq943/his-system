<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>HIS 穩定版系統</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
        .btn-blue { background: #2c7be5; color: white; }
        .btn-purple { background: #6e41c1; color: white; }
        .btn-green { background: #00d97e; color: white; }
        .order-box { border: 1px solid #eee; padding: 10px; margin-bottom: 10px; background: #f9f9f9; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 5px; }
        .mar-item { border: 2px solid #6e41c1; border-radius: 8px; padding: 15px; margin-top: 15px; }
        .dose-text { font-size: 32px; color: #e63757; font-weight: bold; margin: 10px 0; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div id="login-section">
        <h2 style="text-align:center;">醫療系統驗證登入</h2>
        <p style="font-size: 12px; color: #666;">帳號：staff / doctor / nurse | 密碼：1234</p>
        <input type="text" id="login-user" placeholder="輸入帳號">
        <input type="password" id="login-pass" placeholder="輸入密碼">
        <button class="btn-blue" onclick="handleLogin()">登入系統</button>
    </div>

    <div id="main-app" class="hidden">
        <div class="header">
            <b id="display-role">角色名稱</b>
            <button style="width:auto; margin:0; padding:5px 10px;" onclick="handleLogout()">登出</button>
        </div>

        <div id="view-staff" class="hidden">
            <h3>病患掛號查詢</h3>
            <input type="text" id="search-input" placeholder="輸入電話或生日查詢..." onkeyup="searchPatient()">
            <div id="search-results"></div>
            <hr>
            <h3>新增初診</h3>
            <input type="text" id="reg-name" placeholder="姓名">
            <input type="text" id="reg-id" placeholder="身分證號">
            <input type="text" id="reg-tel" placeholder="電話">
            <input type="text" id="reg-dob" placeholder="生日 (YYYYMMDD)">
            <button class="btn-blue" onclick="saveNewPatient()">儲存並掛號</button>
        </div>

        <div id="view-doctor" class="hidden">
            <h3>醫師診療處方</h3>
            <label>選擇病患：</label>
            <select id="doctor-p-select"></select>
            <textarea id="doctor-soap" placeholder="病歷紀錄 (SOAP)..."></textarea>
            <h4>開立處方 (最多5組)</h4>
            <div id="pres-container"></div>
            <button class="btn-green" onclick="sendOrders()">發送醫囑</button>
        </div>

        <div id="view-nurse" class="hidden">
            <h3>護理給藥 (MAR)</h3>
            <select id="nurse-p-select" onchange="showMAR()"></select>
            <div id="mar-list"></div>
        </div>
    </div>
</div>

<script>
    // 預設資料
    let patients = JSON.parse(localStorage.getItem("h_pts") || '[{"name":"張測試","id":"A123456789","tel":"0912","dob":"19900101"}]');
    let queue = JSON.parse(localStorage.getItem("h_queue") || '[]');
    let orders = JSON.parse(localStorage.getItem("h_orders") || '[]');

    // 1. 登入邏輯
    window.handleLogin = function() {
        const u = document.getElementById("login-user").value.toLowerCase().trim();
        const p = document.getElementById("login-pass").value.trim();

        if (p !== "1234") { alert("密碼錯誤"); return; }
        if (u === "staff" || u === "doctor" || u === "nurse") {
            sessionStorage.setItem("myRole", u);
            startSystem();
        } else {
            alert("帳號請輸入 staff, doctor 或 nurse");
        }
    };

    window.handleLogout = function() {
        sessionStorage.clear();
        location.reload();
    };

    // 2. 啟動系統
    function startSystem() {
        const role = sessionStorage.getItem("myRole");
        if (!role) return;

        document.getElementById("login-section").classList.add("hidden");
        document.getElementById("main-app").classList.remove("hidden");
        document.getElementById("display-role").innerText = "目前權限：" + role.toUpperCase();

        // 隱藏所有視圖
        document.getElementById("view-staff").classList.add("hidden");
        document.getElementById("view-doctor").classList.add("hidden");
        document.getElementById("view-nurse").classList.add("hidden");

        // 顯示對應視圖
        document.getElementById("view-" + role).classList.remove("hidden");

        if (role === "doctor") initDoctorView();
        updateAllSelects();
    }

    // 3. 櫃檯功能
    window.searchPatient = function() {
        const key = document.getElementById("search-input").value.toUpperCase();
        const res = document.getElementById("search-results");
        res.innerHTML = "";
        if (key.length < 2) return;

        patients.filter(p => p.tel.includes(key) || p.id.includes(key)).forEach(p => {
            res.innerHTML += `<div style="padding:5px; border-bottom:1px solid #eee;">
                ${p.name} (${p.id}) <button style="width:auto; padding:2px 10px;" onclick="addQueue('${p.id}')">掛號</button>
            </div>`;
        });
    };

    window.saveNewPatient = function() {
        const p = {
            name: document.getElementById("reg-name").value,
            id: document.getElementById("reg-id").value.toUpperCase(),
            tel: document.getElementById("reg-tel").value,
            dob: document.getElementById("reg-dob").value
        };
        if (!p.name || !p.id) return alert("必填欄位缺失");
        patients.push(p);
        localStorage.setItem("h_pts", JSON.stringify(patients));
        addQueue(p.id);
        alert("新增成功並已掛號");
    };

    window.addQueue = function(id) {
        const p = patients.find(x => x.id === id);
        if (!queue.find(x => x.id === id)) {
            queue.push(p);
            localStorage.setItem("h_queue", JSON.stringify(queue));
        }
        updateAllSelects();
    };

    // 4. 醫師功能
    function initDoctorView() {
        const container = document.getElementById("pres-container");
        container.innerHTML = "";
        for (let i = 0; i < 5; i++) {
            container.innerHTML += `
                <div class="order-box">
                    <input class="m-name" placeholder="藥名">
                    <input class="m-dose" placeholder="劑量">
                    <input class="m-freq" placeholder="次數">
                    <input class="m-days" placeholder="天數">
                </div>`;
        }
    }

    window.sendOrders = function() {
        const pName = document.getElementById("doctor-p-select").value;
        const soap = document.getElementById("doctor-soap").value;
        if (!pName) return alert("未選擇病患");

        const rows = document.querySelectorAll(".order-box");
        let count = 0;
        rows.forEach(row => {
            const m = row.querySelector(".m-name").value;
            const d = row.querySelector(".m-dose").value;
            const f = row.querySelector(".m-freq").value;
            const dy = row.querySelector(".m-days").value;
            if (m && d) {
                orders.push({ pName, m, d, f, dy, soap, time: new Date().toLocaleTimeString() });
                count++;
            }
        });
        localStorage.setItem("h_orders", JSON.stringify(orders));
        alert("成功開立 " + count + " 筆醫囑");
        location.reload();
    };

    // 5. 護理功能
    window.showMAR = function() {
        const p = document.getElementById("nurse-p-select").value;
        const list = document.getElementById("mar-list");
        list.innerHTML = "";
        orders.filter(o => o.pName === p).forEach((o, i) => {
            list.innerHTML += `
                <div class="mar-item">
                    <small>時間：${o.time}</small>
                    <p><b>藥名：${o.m}</b></p>
                    <div class="dose-text">${o.d}</div>
                    <p>頻率：${o.f} | 天數：${o.dy}</p>
                    <button class="btn-purple" onclick="finishMed('${o.pName}', ${i})">核對並給藥</button>
                </div>`;
        });
    };

    window.finishMed = function(pName, idx) {
        const realIdx = orders.findIndex(o => o.pName === pName);
        orders.splice(realIdx, 1);
        localStorage.setItem("h_orders", JSON.stringify(orders));
        showMAR();
    };

    function updateAllSelects() {
        const opt = queue.map(p => `<option value="${p.name}">${p.name} (${p.id})</option>`).join("");
        const dSel = document.getElementById("doctor-p-select");
        const nSel = document.getElementById("nurse-p-select");
        if (dSel) dSel.innerHTML = opt;
        if (nSel) nSel.innerHTML = '<option value="">--請選擇--</option>' + opt;
    }

    // 自動加載
    if (sessionStorage.getItem("myRole")) startSystem();
</script>

</body>
</html>
