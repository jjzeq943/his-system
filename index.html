<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Jing Yao Yan 診所雲端系統</title>
    <style>
        :root { --primary: #2c7be5; --nurse: #6e41c1; --doctor: #00d97e; --danger: #e63757; --bg: #f9fbfd; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        .hidden { display: none !important; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e3ebf6; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 5px; color: white; }
        .bg-staff { background: var(--primary); }
        .bg-doctor { background: var(--doctor); }
        .bg-nurse { background: var(--nurse); }
        .order-row { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 8px; border: 1px solid #eee; }
        .med-dose-big { font-size: 48px; font-weight: 900; color: var(--danger); text-align: center; margin: 15px 0; background: #fff5f5; border-radius: 8px; padding: 10px; }
        .mar-card { border: 3px solid var(--nurse); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div id="loginBox" style="text-align: center; padding: 40px 0;">
        <h2 style="color:var(--primary);">Jing Yao Yan 雲端登入</h2>
        <input id="username" type="text" placeholder="帳號 (staff / doctor / nurse)">
        <button class="bg-staff" onclick="doLogin()">進入系統</button>
    </div>

    <div id="app" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items:center; border-bottom:1px solid #eee; padding-bottom:10px; margin-bottom:20px;">
            <b id="userDisplay"></b>
            <button onclick="location.reload()" style="width:auto; background:#666; padding: 5px 15px;">登出</button>
        </div>

        <div id="mod-staff" class="role-module hidden">
            <h3>掛號系統</h3>
            <input id="nP-name" placeholder="病患姓名">
            <input id="nP-id" placeholder="身分證號">
            <button class="bg-staff" onclick="runRegister()">確認掛號</button>
        </div>

        <div id="mod-doctor" class="role-module hidden">
            <h3>醫師處方箋 (5格)</h3>
            <select id="sel-clinic"></select>
            <div id="order-container"></div>
            <button class="bg-doctor" onclick="runSubmit()">傳送處方</button>
        </div>

        <div id="mod-nurse" class="role-module hidden">
            <h3>護理給藥 (大紅字)</h3>
            <select id="sel-nurse" onchange="renderMAR()"></select>
            <div id="marArea"></div>
        </div>
    </div>
</div>

<script>
    // 🔴 潘醫師，這串網址我已經幫您對過照片 10 遍，大小寫字母已全部修正：
const CLOUD_URL = "const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzw_EJSXLfrnp8xyJATDaNozelrtlztXbLdxiwFSNBcz6dlLYroCyplEfz7d-mTkUAO7/exec";
";


    let cloudData = { queue: [], orders: [] };

    async function pull() {
        try {
            const res = await fetch(CLOUD_URL + "?t=" + Date.now());
            cloudData = await res.json();
            updateUI();
            console.log("連線成功！");
        } catch (e) { 
            console.log("正在重新連線..."); 
        }
    }

    async function push() {
        try {
            await fetch(CLOUD_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(cloudData) 
            });
            setTimeout(pull, 800);
        } catch (e) { }
    }

    function doLogin() {
        const u = document.getElementById("username").value.toLowerCase().trim();
        if(!['staff','doctor','nurse'].includes(u)) return alert("帳號錯誤");
        sessionStorage.setItem("role", u);
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        document.getElementById("userDisplay").innerText = "身分：" + u;
        document.querySelectorAll(".role-module").forEach(m => m.classList.add("hidden"));
        document.getElementById("mod-" + u).classList.remove("hidden");
        if(u==='doctor') {
            const c = document.getElementById("order-container");
            c.innerHTML = "";
            for(let i=0; i<5; i++) {
                c.innerHTML += `<div class="order-row"><input class="m-n" placeholder="藥名"><input class="m-d" placeholder="劑量"><input class="m-f" placeholder="頻率"><input class="m-p" placeholder="途徑"></div>`;
            }
        }
        pull();
        setInterval(pull, 5000);
    }

    function runRegister() {
        const n = document.getElementById("nP-name").value;
        const i = document.getElementById("nP-id").value;
        if(!n) return;
        cloudData.queue.push({name: n, id: i});
        push();
        alert("掛號成功");
    }

    function runSubmit() {
        const p = document.getElementById("sel-clinic").value;
        if(!p) return alert("請先選擇病患");
        document.querySelectorAll(".order-row").forEach(r => {
            const m = r.querySelector(".m-n").value;
            const d = r.querySelector(".m-d").value;
            if(m && d) {
                cloudData.orders.push({p, m, d, f: r.querySelector(".m-f").value, h: r.querySelector(".m-p").value});
            }
        });
        push();
        alert("醫囑傳送完成");
        location.reload();
    }

    function renderMAR() {
        const p = document.getElementById("sel-nurse").value;
        const a = document.getElementById("marArea");
        a.innerHTML = "";
        cloudData.orders.filter(o => o.p === p).forEach((o, i) => {
            a.innerHTML += `<div class="mar-card"><h3>${o.m}</h3><div class="med-dose-big">${o.d}</div><p>頻率：${o.f} | 途徑：${o.h}</p><button class="bg-nurse" onclick="finishMed('${o.p}','${o.m}')">核對給藥</button></div>`;
        });
    }

    function finishMed(p, m) {
        const idx = cloudData.orders.findIndex(o => o.p === p && o.m === m);
        if(idx > -1) {
            cloudData.orders.splice(idx, 1);
            push();
        }
    }

    function updateUI() {
        const opts = cloudData.queue.map(p => `<option value="${p.name}">${p.name}</option>`).join("");
        document.getElementById("sel-clinic").innerHTML = opts;
        const ns = document.getElementById("sel-nurse");
        const old = ns.value;
        ns.innerHTML = '<option value="">--選病患--</option>' + opts;
        ns.value = old;
        if(sessionStorage.getItem("role")==='nurse') renderMAR();
    }
</script>
</body>
</html>
